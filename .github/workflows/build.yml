name: Build and Release Mod

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle 8.10
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Build mod
        run: gradle build

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: blood-n-particles-client
          path: build/libs/*[^-sources].jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*[^-sources].jar
          generate_release_notes: true
          name: "Blood N' Particles Client ${{ github.ref_name }}"
          body: |
            ## Blood N' Particles — Client-Side Mod

            **Minecraft:** 26.1
            **Fabric Loader:** 0.18.5+
            **Server required:** None — works on any server, vanilla or modded

            ### How to install
            1. Download the `.jar` file below
            2. Drop it into your `.minecraft/mods` folder
            3. Done — the server needs zero changes
